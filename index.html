<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>실시간 게임</title>
</head>
<body>
    <h2>🎮 실시간 테스트방</h2>
    <button onclick="sendClick()" style="padding:10px 20px; font-size:16px;">버튼 누르기</button>
    <ul id="log"></ul>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const log = document.getElementById('log');

        function sendClick() {
            socket.emit('click');
        }

        socket.on('msg', (text) => {
            const li = document.createElement('li');
            li.innerText = text;
            log.appendChild(li);
        });
    </script>
</body>
</html>
